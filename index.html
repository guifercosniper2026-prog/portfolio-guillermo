<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guillermo | Portfolio Profesional</title>
    <style>
        /* ESTILOS BASE */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .botonera {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 30px;
}

.boton-pro {
    padding: 12px 24px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    transition: transform 0.2s, background 0.3s;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.boton-pro:hover {
    transform: translateY(-3px);
    filter: brightness(1.2);
}

.azul { background-color: #007AFF; color: white; }
.verde { background-color: #34C759; color: white; }
.rojo { background-color: #FF3B30; color: white; }

        .container {
            max-width: 420px;
            width: 100%;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        /* FOTO DE PERFIL */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #007bff;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.3);
        }

        h1 { 
            margin: 0; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            font-size: 24px;
        }

        .subtitle { 
            color: #888; 
            margin-bottom: 30px; 
            font-size: 0.85em; 
            letter-spacing: 1px;
        }

        /* BOTONERA */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background-color: #007bff;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
            display: block;
            transition: all 0.3s ease;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        /* VIDEO */
        .video-wrapper {
            margin-top: 30px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #444;
            background: #000;
        }

        video {
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="foto.png" alt="Guillermo" class="profile-img">
        
        <h1>GUILLERMO</h1>
 <p class="subtitle">Dominando los mercados y diseñando soluciones digitales con precisión.</p>

<div class="botonera">

    <a href="reporte_profesional_trading.csv" download class="boton-pro verde">📊 Data EUR/USD</a>
    <a href="SOP-Guillermo-ISO.pdf" target="_blank" class="boton-pro rojo">📕 Manual SOP</a>
</div>

<div align="center" style="margin-top: 30px;">
    <img src="grafico_trading.png" alt="Análisis de Trading" style="width:100%; max-width:600px; border-radius: 15px; border: 1px solid #444;">
</div>

                <source src="operativa-sniper.mp4" type="video/mp4">

            </video>
        </div>
    </div>

</body>
</html>
